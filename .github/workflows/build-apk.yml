name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Create local.properties from secrets
        run: |
          echo "TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}" > local.properties
          echo "TG_GROUP_ID=${{ secrets.TG_GROUP_ID }}" >> local.properties

      - name: Build with Gradle
        # We use 'clean' to reset the environment and 'assembleDebug' to build
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          # Using the wildcard search again to ensure we find it
          path: "**/build/outputs/apk/debug/*.apk"