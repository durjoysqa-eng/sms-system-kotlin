name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build with Gradle
        # We use 'clean' to remove any old build states
        # -P passes the secrets directly to the build script
        run: >
          ./gradlew clean :app:assembleDebug 
          -PTG_BOT_TOKEN="${{ secrets.TG_BOT_TOKEN }}" 
          -PTG_GROUP_ID="${{ secrets.TG_GROUP_ID }}" 
          --no-daemon 
          --stacktrace

      - name: Verify APK Location
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          # We search for any APK in the app folder
          path: "app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error